<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STINGERNATION</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0d0d0f; --surface:#17171c; --surface2:#1f1f27;
  --border:#2e2e3a; --accent:#c8a96e; --accent2:#e8c87e;
  --text:#e8e8ec; --text-muted:#888899;
  --red:#e05555; --green:#5eb87a; --blue:#5b9bd5;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;padding:40px 20px 80px;}

.sidenav{
  position:fixed;right:18px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;align-items:flex-end;
  background:rgba(23,23,28,.82);border:1px solid var(--border);
  border-radius:10px;padding:6px 0;z-index:100;
}
.sidenav a{
  display:flex;flex-direction:column;align-items:center;
  padding:10px 12px;color:var(--text-muted);
  text-decoration:none;font-family:'Bebas Neue';font-size:13px;
}
.sidenav a:hover{color:var(--accent2);}
.sidenav .nav-divider{height:1px;width:70%;background:var(--border);margin:4px auto;}

.sidenav .sns-link{border-top:1px solid var(--border);margin-top:8px;padding-top:12px;position:relative;}
.sidenav .sns-link svg{width:18px;height:18px;fill:currentColor;}
.sidenav .sns-link:hover svg{filter:drop-shadow(0 0 6px rgba(200,169,110,.6));transform:scale(1.1);}

.tooltip{
  position:absolute;right:120%;top:50%;transform:translateY(-50%);
  background:var(--surface2);padding:4px 8px;border-radius:4px;
  opacity:0;transition:.15s;font-size:11px;
}
.sns-link:hover .tooltip{opacity:1;}

.section{max-width:1100px;margin:0 auto 48px;}
.section-title{font-family:'Bebas Neue';font-size:22px;color:var(--accent);margin-bottom:16px;border-bottom:1px solid var(--border);}

.table-wrap{border:1px solid var(--border);border-radius:10px;overflow:auto;}
table{width:100%;border-collapse:collapse;}
td,th{padding:14px;}
tbody tr{background:var(--surface);border-top:1px solid var(--border);}
tbody tr:hover{background:#1e1e28;}

.footer{text-align:center;margin-top:60px;color:var(--text-muted);font-size:12px;}
</style>
</head>

<body>

<nav class="sidenav" id="sidenav">
  <a href="#top" data-target="top">TOP</a>
  <div class="nav-divider"></div>

  <a href="#sec-notice" data-target="sec-notice">📢</a>

  <div class="nav-divider"></div>

  <a href="#t20" data-target="t20">2.0T</a>
  <a href="#t25" data-target="t25">2.5T</a>
  <a href="#t33" data-target="t33">3.3T</a>
  <a href="#t22" data-target="t22">2.2D</a>

  <a href="#sec-cycle" data-target="sec-cycle">🔧</a>
  <a href="#sec-fluid" data-target="sec-fluid">🧪</a>

  <div class="nav-divider"></div>

  <a href="instagram://user?username=stinger__nation"
     data-fallback="https://www.instagram.com/stinger__nation"
     class="sns-link">
    <svg viewBox="0 0 24 24">
      <path d="M7 2C4 2 2 4 2 7v10c0 3 2 5 5 5h10c3 0 5-2 5-5V7c0-3-2-5-5-5H7z"/>
    </svg>
    <span class="tooltip">Instagram</span>
  </a>
</nav>

<div id="top" class="section">
  <div class="section-title">STINGERNATION</div>
</div>

<div id="sec-notice" class="section">
  <div class="section-title">공지사항</div>
</div>

<div id="t20" class="section"><div class="section-title">2.0 TURBO</div></div>
<div id="t25" class="section"><div class="section-title">2.5 TURBO</div></div>
<div id="t33" class="section"><div class="section-title">3.3 TURBO</div></div>

<div id="t22" class="section">
  <div class="section-title">2.2 DIESEL</div>
</div>

<!-- 이동 완료 -->
<div id="sec-cycle" class="section">
  <div class="section-title">소모품 교체 주기</div>
</div>

<div id="sec-fluid" class="section">
  <div class="section-title">유체 용량</div>
</div>

<div class="footer">STINGER GUIDE</div>

<script>
(function () {
  var sections = ['top','sec-notice','t20','t25','t33','t22','sec-cycle','sec-fluid'];
  var navLinks = document.querySelectorAll('#sidenav a[data-target]');

  function setActive(id){
    navLinks.forEach(a=>{
      a.classList.toggle('active',a.getAttribute('data-target')===id);
    });
  }

  function onScroll(){
    var current = sections[0];
    sections.forEach(id=>{
      var el=document.getElementById(id);
      if(el && el.getBoundingClientRect().top<=120){
        current=id;
      }
    });
    setActive(current);
  }

  window.addEventListener('scroll',onScroll);
  onScroll();
})();

document.querySelector('.sns-link').addEventListener('click',function(){
  var fallback=this.getAttribute('data-fallback');
  setTimeout(()=>{window.location.href=fallback;},800);
});
</script>

</body>
</html>
